spring:
  application:
    name: loan-service

  datasource:
    url: jdbc:postgresql://localhost:5432/loan-service
    username: loan_admin
    password: admin_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
